name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - run: deno fmt --check

      # TODO

      # azi.aar
      - run: cd azi-aar && ./gradlew assemble
      # upload
      - run: cp azi-aar/libazi/build/outputs/aar/libazi-release.aar azi.aar
      - uses: actions/upload-artifact@v4
        with:
          name: azi-aar
          path: azi.aar

      # cp azi.aar
      - run: mkdir -p demo-apk/app/libs && cp azi.aar demo-apk/app/libs/

      # azi-demo.apk
      - run: cd demo-apk && ./gradlew assemble
      # upload
      - run: cp demo-apk/app/build/outputs/apk/debug/app-debug.apk azi-demo-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: azi-demo-debug.apk
          path: azi-demo-debug.apk

      # TODO
